# ══════════════════════════════════════════════════════════════════
# RoboMasterClient 静态分发站 nginx 配置片段
# 部署步骤:
#   1. 把 files/VERSION.txt/manifest.json 等放到 /var/www/html/robomaster/
#   2. 把下面 location 块加入 antientropy.xin 的 server {}
#   3. nginx -t && systemctl reload nginx
# ══════════════════════════════════════════════════════════════════

# 在已有的 HTTPS server { listen 443 ssl; server_name antientropy.xin; ... } 中加入：

location /robomaster/ {
    alias /var/www/html/robomaster/;

    # 目录浏览关闭（客户端只按 manifest 精确请求）
    autoindex off;

    # manifest.json 禁缓存（发新版本要立即生效）
    location ~ ^/robomaster/.+/manifest\.json$ {
        alias /var/www/html/robomaster/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri =404;
    }

    # VERSION.txt 同理
    location = /robomaster/VERSION.txt {
        alias /var/www/html/robomaster/VERSION.txt;
        add_header Cache-Control "no-cache";
        expires -1;
    }

    # files/ 内容按 SHA256 寻址，可以强缓存（文件路径变了才会重下）
    # 但客户端每次都会主动校验，不依赖缓存，简单起见也设 no-cache
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;

    # 大文件下载优化
    sendfile on;
    tcp_nopush on;
    gzip off;   # 二进制已压缩，gzip 反而耗 CPU

    # 可选：限速防止被单客户端打满带宽
    # limit_rate 10m;
}
